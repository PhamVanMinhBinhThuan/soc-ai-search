name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

env:
  LLM_PROVIDER: mock
  LLM_API_KEY: ""
  APP_AUTH_ENABLED: "false"
  POSTGRES_DB: soc_ai_search
  POSTGRES_USER: soc_ai_search
  POSTGRES_PASSWORD: ci-postgres-password
  APP_DEMO_USER_IDENTITY: demo-analyst
  ELASTICSEARCH_INDEX_EVENTS: soc-events-v1
  EXPORT_ES_TIMEOUT_MS: "10000"

jobs:
  backend:
    name: Backend tests and coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend coverage gate
        working-directory: backend
        run: |
          chmod +x ./mvnw
          ./mvnw verify

  frontend:
    name: Frontend tests, lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

  compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config --quiet
