spring.application.name=soc-ai-search-backend
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:soc_ai_search}
spring.datasource.username=${POSTGRES_USER:soc_ai_search}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

app.audit.demo-user-identity=${APP_DEMO_USER_IDENTITY:demo-analyst}

app.elasticsearch.url=${ELASTICSEARCH_URL:http://localhost:9200}
app.elasticsearch.username=${ELASTICSEARCH_USERNAME:}
app.elasticsearch.password=${ELASTICSEARCH_PASSWORD:}
app.elasticsearch.index-events=${ELASTICSEARCH_INDEX_EVENTS:soc-events-v1}

app.export.es-timeout-ms=${EXPORT_ES_TIMEOUT_MS:10000}

app.llm.provider=${LLM_PROVIDER:mock}
app.llm.base-url=${LLM_BASE_URL:}
app.llm.api-key=${LLM_API_KEY:}
app.llm.model=${LLM_MODEL:}
app.llm.timeout-ms=${LLM_TIMEOUT_MS:10000}
app.llm.summary-timeout-ms=${LLM_SUMMARY_TIMEOUT_MS:5000}
app.llm.max-attempts=${LLM_MAX_ATTEMPTS:2}
