spring.application.name=soc-ai-search-backend
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:soc_ai_search}
spring.datasource.username=${POSTGRES_USER:soc_ai_search}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

app.elasticsearch.url=${ELASTICSEARCH_URL:http://localhost:9200}
app.elasticsearch.username=${ELASTICSEARCH_USERNAME:}
app.elasticsearch.password=${ELASTICSEARCH_PASSWORD:}
app.elasticsearch.index-events=${ELASTICSEARCH_INDEX_EVENTS:soc-events-v1}
