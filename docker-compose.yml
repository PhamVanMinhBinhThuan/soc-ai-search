services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soc_ai_search}
      POSTGRES_USER: ${POSTGRES_USER:-soc_ai_search}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before running Docker Compose}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-soc_ai_search} -d ${POSTGRES_DB:-soc_ai_search}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "127.0.0.1:${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-soc_ai_search}
      POSTGRES_USER: ${POSTGRES_USER:-soc_ai_search}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before running Docker Compose}
      APP_DEMO_USER_IDENTITY: ${APP_DEMO_USER_IDENTITY:-demo-analyst}
      APP_AUTH_ENABLED: ${APP_AUTH_ENABLED:-false}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:8082/realms/soc-ai-search}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:8080/realms/soc-ai-search/protocol/openid-connect/certs}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME:-}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-}
      ELASTICSEARCH_INDEX_EVENTS: ${ELASTICSEARCH_INDEX_EVENTS:-soc-events-v1}
      EXPORT_ES_TIMEOUT_MS: ${EXPORT_ES_TIMEOUT_MS:-10000}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-10000}
      LLM_SUMMARY_TIMEOUT_MS: ${LLM_SUMMARY_TIMEOUT_MS:-5000}
      LLM_MAX_ATTEMPTS: ${LLM_MAX_ATTEMPTS:-2}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/api/v1/health/live || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    profiles:
      - auth
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-keycloak}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8082}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/realm-export:/opt/keycloak/data/import:ro

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.2
    profiles:
      - tools
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    ports:
      - "127.0.0.1:${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  postgres_data:
  elasticsearch_data:
  keycloak_data:
